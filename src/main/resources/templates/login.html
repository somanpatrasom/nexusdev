<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — NexusDev</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-container {
            max-width: 420px;
            margin: 8rem auto;
            padding: 2rem;
        }
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
        }
        .login-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.95rem;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn-login:hover {
            opacity: 0.9;
        }
        .error-msg {
            background: #3a1a1a;
            border: 1px solid #f87171;
            color: #f87171;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
        }
        .success-msg {
            background: #1a3a1a;
            border: 1px solid #4ade80;
            color: #4ade80;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.2rem;
            font-size: 0.9rem;
        }
        .join-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .join-link a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-box">

        <div class="login-header">
            <h1>⚡ NexusDev</h1>
            <p>Sign in to your lab</p>
        </div>

        <!-- Error message -->
        <div class="error-msg" th:if="${param.error}">
            Invalid username or password.
        </div>

        <!-- Logout message -->
        <div class="success-msg" th:if="${param.logout}">
            You have been signed out.
        </div>

        <!-- Login form -->
        <!-- action="/login" is handled by Spring Security automatically -->
        <form method="post" action="/login">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="form-group">
                <label>Username</label>
                <input type="text"
                       name="username"
                       placeholder="your username"
                       autofocus/>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password"
                       name="password"
                       placeholder="your password"/>
            </div>

            <button type="submit" class="btn-login">
                Sign In →
            </button>
        </form>

        <div class="join-link">
            New to NexusDev?
            <a href="/join">Join with an invite code</a>
        </div>

    </div>
</div>
</body>
</html>
